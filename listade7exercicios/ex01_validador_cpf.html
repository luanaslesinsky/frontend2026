<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ex 01 — Validador de CPF</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--ink:#0f1117;--ink-mid:#3a3d4a;--ink-soft:#6b7280;--surface:#f6f7f9;--card:#ffffff;--border:#e2e4ea;--accent:#2563eb;--green:#16a34a;--green-light:#f0fdf4;--red:#dc2626;--red-light:#fef2f2;--radius:12px;--radius-sm:8px;}
  body{font-family:'Inter',sans-serif;background:var(--surface);color:var(--ink);line-height:1.6;padding:32px 16px 60px;min-height:100vh;}
  .wrap{max-width:580px;margin:0 auto;}
  .ex-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .ex-head{display:flex;align-items:center;gap:14px;padding:20px 28px;border-bottom:1px solid var(--border);background:#fafafa;}
  .ex-num{width:34px;height:34px;border-radius:50%;background:var(--ink);color:white;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .ex-title{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:600;}
  .ex-body{padding:28px;}
  label{display:block;font-size:.82rem;font-weight:500;color:var(--ink-mid);margin-bottom:6px;}
  input[type=text]{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:.95rem;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s;}
  input:focus{border-color:var(--accent);background:white;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
  .btn{display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);padding:11px 22px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;margin-top:14px;}
  .btn:hover{opacity:.85;}.btn:active{transform:scale(.98);}
  .result{margin-top:18px;padding:16px 20px;border-radius:var(--radius-sm);font-size:1rem;font-weight:500;display:none;align-items:center;gap:10px;}
  .result.show{display:flex;}
  .result.ok{background:var(--green-light);color:var(--green);border:1px solid #bbf7d0;}
  .result.err{background:var(--red-light);color:var(--red);border:1px solid #fecaca;}
  .result-icon{font-size:1.3rem;flex-shrink:0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="ex-card">
    <div class="ex-head">
      <div class="ex-num">01</div>
      <div class="ex-title">⚡ Validador de CPF</div>
    </div>
    <div class="ex-body">
      <div style="margin-bottom:16px">
        <label for="cpf-input">Número do CPF</label>
        <input type="text" id="cpf-input" placeholder="000.000.000-00" maxlength="14">
      </div>
      <button class="btn" onclick="validarCPF()">Validar CPF</button>
      <div class="result" id="cpf-result">
        <span class="result-icon" id="cpf-icon"></span>
        <span id="cpf-msg"></span>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Formata CPF enquanto digita ── */
document.getElementById('cpf-input').addEventListener('input', function () {
  let v = this.value.replace(/\D/g, '').slice(0, 11);
  if (v.length > 9)      v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{0,2})/, '$1.$2.$3-$4');
  else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{0,3})/, '$1.$2.$3');
  else if (v.length > 3) v = v.replace(/(\d{3})(\d{0,3})/, '$1.$2');
  this.value = v;
});

/* ── Validação ── */
function validarCPF() {
  const raw = document.getElementById('cpf-input').value.replace(/\D/g, '');
  const result  = document.getElementById('cpf-result');
  const icon    = document.getElementById('cpf-icon');
  const msg     = document.getElementById('cpf-msg');

  function show(tipo, ic, texto) {
    result.className = 'result show ' + tipo;
    icon.textContent = ic;
    msg.textContent  = texto;
  }

  if (raw.length !== 11) {
    show('err', '❌', 'CPF inválido — deve conter 11 dígitos numéricos.');
    return;
  }

  // Rejeita sequências repetidas (ex: 111.111.111-11)
  if (/^(\d)\1{10}$/.test(raw)) {
    show('err', '❌', 'CPF inválido — sequência de dígitos repetidos não é permitida.');
    return;
  }

  /* ── 1º dígito verificador ──
     Multiplica os 9 primeiros dígitos pelos pesos 10 a 2,
     soma tudo, multiplica por 10 e pega o resto da divisão por 11.
     Se o resto for >= 10, o dígito é 0. */
  let soma = 0;
  for (let i = 0; i < 9; i++) {
    soma += Number(raw[i]) * (10 - i);
  }
  let resto = (soma * 10) % 11;
  const d1 = resto >= 10 ? 0 : resto;

  /* ── 2º dígito verificador ──
     Multiplica os 10 primeiros dígitos pelos pesos 11 a 2,
     soma tudo, multiplica por 10 e pega o resto da divisão por 11.
     Se o resto for >= 10, o dígito é 0. */
  soma = 0;
  for (let i = 0; i < 10; i++) {
    soma += Number(raw[i]) * (11 - i);
  }
  resto = (soma * 10) % 11;
  const d2 = resto >= 10 ? 0 : resto;

  const cpfFormatado = raw.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');

  if (d1 === Number(raw[9]) && d2 === Number(raw[10])) {
    show('ok', '✅', `CPF ${cpfFormatado} é VÁLIDO.`);
  } else {
    show('err', '❌', `CPF ${cpfFormatado} é INVÁLIDO — dígitos verificadores não conferem.`);
  }
}
</script>
</body>
</html>
