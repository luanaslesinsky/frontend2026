<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ex 04 — Taxas Infinity Bank</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--ink:#0f1117;--ink-mid:#3a3d4a;--ink-soft:#6b7280;--surface:#f6f7f9;--card:#ffffff;--border:#e2e4ea;--accent:#2563eb;--red:#dc2626;--red-light:#fef2f2;--radius:12px;--radius-sm:8px;}
  body{font-family:'Inter',sans-serif;background:var(--surface);color:var(--ink);line-height:1.6;padding:32px 16px 60px;min-height:100vh;}
  .wrap{max-width:580px;margin:0 auto;}
  .ex-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .ex-head{display:flex;align-items:center;gap:14px;padding:20px 28px;border-bottom:1px solid var(--border);background:#fafafa;}
  .ex-num{width:34px;height:34px;border-radius:50%;background:var(--ink);color:white;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .ex-title{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:600;}
  .ex-body{padding:28px;}
  label{display:block;font-size:.82rem;font-weight:500;color:var(--ink-mid);margin-bottom:6px;}
  input[type=number]{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:.95rem;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s;}
  input:focus{border-color:var(--accent);background:white;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
  select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:.95rem;color:var(--ink);background:var(--surface);outline:none;cursor:pointer;}
  select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
  .btn{display:inline-flex;align-items:center;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);padding:11px 22px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;margin-top:14px;}
  .btn:hover{opacity:.85;}.btn:active{transform:scale(.98);}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .field{margin-bottom:16px;}
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:18px;}
  .summary-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;}
  .s-label{font-size:.75rem;color:var(--ink-soft);margin-bottom:4px;}
  .s-val{font-size:1.15rem;font-weight:600;font-family:'Space Grotesk',sans-serif;color:var(--ink);}
  .result{margin-top:18px;padding:16px 20px;border-radius:var(--radius-sm);font-size:1rem;font-weight:500;display:none;align-items:center;gap:10px;}
  .result.show{display:flex;}
  .result.err{background:var(--red-light);color:var(--red);border:1px solid #fecaca;}
  .result-icon{font-size:1.3rem;flex-shrink:0;}
  @media(max-width:460px){.row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="ex-card">
    <div class="ex-head">
      <div class="ex-num">04</div>
      <div class="ex-title">💳 Taxas Infinity Bank</div>
    </div>
    <div class="ex-body">
      <div class="row">
        <div>
          <label>Bandeira do Cartão</label>
          <select id="bandeira">
            <option value="">Selecione...</option>
            <option value="visa">Visa (2%)</option>
            <option value="master">Mastercard (1.85%)</option>
            <option value="elo">Elo (3%)</option>
          </select>
        </div>
        <div>
          <label>Número de Parcelas</label>
          <input type="number" id="parcelas" placeholder="1" min="1" max="24">
        </div>
      </div>
      <div class="field">
        <label>Valor da Venda (R$)</label>
        <input type="number" id="valor-venda" placeholder="0,00" min="0" step="0.01">
      </div>
      <button class="btn" onclick="calcularTaxa()">Calcular</button>

      <div class="summary-grid" id="taxa-summary" style="display:none">
        <div class="summary-item">
          <div class="s-label">Taxa da Bandeira</div>
          <div class="s-val" id="t-taxa">—</div>
        </div>
        <div class="summary-item">
          <div class="s-label">Juros Totais</div>
          <div class="s-val" id="t-juros">—</div>
        </div>
        <div class="summary-item">
          <div class="s-label">Taxa Mensal</div>
          <div class="s-val" id="t-mensal">—</div>
        </div>
        <div class="summary-item">
          <div class="s-label">Valor da Parcela</div>
          <div class="s-val" id="t-parcela" style="color:var(--accent)">—</div>
        </div>
      </div>

      <div class="result" id="taxa-result">
        <span class="result-icon">⚠️</span>
        <span id="taxa-msg"></span>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Regras ──
   Taxa Visa: 2% | Mastercard: 1.85% | Elo: 3%
   Juros simples: Valor × (0.015 × parcelas)       ← 1,5% ao mês
   Taxa mensal fixa: R$ 12,50 × parcelas
   Total = Venda + Taxa Bandeira + Juros + Taxa Mensal
   Parcela = Total ÷ parcelas                       */

function fmt(n) { return 'R$ ' + Number(n).toFixed(2).replace('.', ','); }

function calcularTaxa() {
  const bandeira = document.getElementById('bandeira').value;
  const valor    = parseFloat(document.getElementById('valor-venda').value);
  const parcelas = parseInt(document.getElementById('parcelas').value);
  const summary  = document.getElementById('taxa-summary');
  const result   = document.getElementById('taxa-result');
  const msgEl    = document.getElementById('taxa-msg');

  if (!bandeira || isNaN(valor) || valor <= 0 || isNaN(parcelas) || parcelas < 1) {
    summary.style.display = 'none';
    result.className = 'result show err';
    msgEl.textContent = 'Preencha todos os campos corretamente.';
    return;
  }

  // switch para selecionar a taxa pela bandeira
  let percTaxa;
  switch (bandeira) {
    case 'visa':   percTaxa = 0.02;   break;
    case 'master': percTaxa = 0.0185; break;
    case 'elo':    percTaxa = 0.03;   break;
  }

  const valorTaxa    = valor * percTaxa;
  const juros        = valor * (0.015 * parcelas);  // juros simples: 1,5% × nº parcelas
  const taxaMensal   = 12.50 * parcelas;
  const totalGeral   = valor + valorTaxa + juros + taxaMensal;
  const valorParcela = totalGeral / parcelas;

  document.getElementById('t-taxa').textContent    = fmt(valorTaxa);
  document.getElementById('t-juros').textContent   = fmt(juros);
  document.getElementById('t-mensal').textContent  = fmt(taxaMensal);
  document.getElementById('t-parcela').textContent = fmt(valorParcela);

  summary.style.display = 'grid';
  result.className = 'result'; // esconde erro se estava visível
}
</script>
</body>
</html>
