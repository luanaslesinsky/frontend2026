<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ex 06 — Crédito para Festas & Eventos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--ink:#0f1117;--ink-mid:#3a3d4a;--ink-soft:#6b7280;--surface:#f6f7f9;--card:#ffffff;--border:#e2e4ea;--accent:#2563eb;--green:#16a34a;--red:#dc2626;--red-light:#fef2f2;--radius:12px;--radius-sm:8px;}
  body{font-family:'Inter',sans-serif;background:var(--surface);color:var(--ink);line-height:1.6;padding:32px 16px 60px;min-height:100vh;}
  .wrap{max-width:580px;margin:0 auto;}
  .ex-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .ex-head{display:flex;align-items:center;gap:14px;padding:20px 28px;border-bottom:1px solid var(--border);background:#fafafa;}
  .ex-num{width:34px;height:34px;border-radius:50%;background:var(--ink);color:white;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .ex-title{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:600;}
  .ex-body{padding:28px;}
  label{display:block;font-size:.82rem;font-weight:500;color:var(--ink-mid);margin-bottom:6px;}
  input[type=number]{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:.95rem;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s;}
  input:focus{border-color:var(--accent);background:white;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
  select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:.95rem;color:var(--ink);background:var(--surface);outline:none;cursor:pointer;}
  select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
  .btn{display:inline-flex;align-items:center;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);padding:11px 22px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;margin-top:14px;}
  .btn:hover{opacity:.85;}.btn:active{transform:scale(.98);}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:18px;}
  .summary-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;}
  .s-label{font-size:.75rem;color:var(--ink-soft);margin-bottom:4px;}
  .s-val{font-size:1.15rem;font-weight:600;font-family:'Space Grotesk',sans-serif;color:var(--ink);}
  .result{margin-top:18px;padding:16px 20px;border-radius:var(--radius-sm);font-size:1rem;font-weight:500;display:none;align-items:center;gap:10px;}
  .result.show{display:flex;}
  .result.err{background:var(--red-light);color:var(--red);border:1px solid #fecaca;}
  .result-icon{font-size:1.3rem;flex-shrink:0;}
  .desconto-badge{display:inline-block;background:#f0fdf4;color:var(--green);border:1px solid #bbf7d0;padding:3px 10px;border-radius:6px;font-size:.8rem;margin-left:6px;font-weight:600;}
  @media(max-width:460px){.row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="ex-card">
    <div class="ex-head">
      <div class="ex-num">06</div>
      <div class="ex-title">🎉 Crédito para Festas &amp; Eventos</div>
    </div>
    <div class="ex-body">
      <div class="row">
        <div>
          <label>Pacote</label>
          <select id="pacote">
            <option value="">Selecione o pacote...</option>
            <option value="50">Standard — R$ 50,00/pessoa</option>
            <option value="80">Premium — R$ 80,00/pessoa</option>
            <option value="120">Infinity Deluxe — R$ 120,00/pessoa</option>
          </select>
        </div>
        <div>
          <label>Quantidade de Pessoas</label>
          <input type="number" id="num-pessoas" placeholder="0" min="1">
        </div>
      </div>

      <button class="btn" onclick="calcularEvento()">Calcular Orçamento</button>

      <div class="summary-grid" id="evento-summary" style="display:none">
        <div class="summary-item">
          <div class="s-label">Custo Bruto</div>
          <div class="s-val" id="e-bruto">—</div>
        </div>
        <div class="summary-item">
          <div class="s-label">Taxa de Serviço (10%)</div>
          <div class="s-val" id="e-taxa">—</div>
        </div>
        <div class="summary-item">
          <div class="s-label">Desconto Fidelidade <span class="desconto-badge">−5%</span></div>
          <div class="s-val" id="e-desconto" style="color:var(--green)">—</div>
        </div>
        <div class="summary-item">
          <div class="s-label">Total Final</div>
          <div class="s-val" id="e-total" style="color:var(--accent)">—</div>
        </div>
      </div>

      <div class="result" id="evento-result">
        <span class="result-icon">⚠️</span>
        <span id="evento-msg"></span>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Regras de Cálculo ──
   1. Custo Bruto   = Valor do pacote × Nº de pessoas
   2. Taxa de Serviço = Custo Bruto × 10%
   3. Subtotal        = Custo Bruto + Taxa de Serviço
   4. Desconto 5%     = aplicado sobre o Subtotal SE pessoas > 100
   5. Total Final     = Subtotal − Desconto
   Use .toFixed(2) para formatar os valores monetários.  */

function fmt(n) { return 'R$ ' + Number(n).toFixed(2).replace('.', ','); }

function calcularEvento() {
  const pacote  = parseFloat(document.getElementById('pacote').value);
  const pessoas = parseInt(document.getElementById('num-pessoas').value);
  const summary = document.getElementById('evento-summary');
  const result  = document.getElementById('evento-result');
  const msgEl   = document.getElementById('evento-msg');

  if (isNaN(pacote) || isNaN(pessoas) || pessoas < 1) {
    summary.style.display = 'none';
    result.className = 'result show err';
    msgEl.textContent = 'Selecione um pacote e informe a quantidade de pessoas.';
    return;
  }

  const bruto    = pacote * pessoas;          // 1. Custo Bruto
  const taxa     = bruto * 0.10;              // 2. Taxa de Serviço (10%)
  const subtotal = bruto + taxa;              // 3. Subtotal

  const desconto = pessoas > 100              // 4. Desconto fidelidade: apenas se > 100 pessoas
    ? subtotal * 0.05
    : 0;

  const total = subtotal - desconto;          // 5. Total Final

  document.getElementById('e-bruto').textContent   = fmt(bruto);
  document.getElementById('e-taxa').textContent    = fmt(taxa);
  document.getElementById('e-desconto').textContent = desconto > 0
    ? '− ' + fmt(desconto)
    : 'Sem desconto';
  document.getElementById('e-total').textContent   = fmt(total);

  // mostra badge de desconto apenas se aplicável
  document.querySelector('.desconto-badge').style.display = pessoas > 100 ? '' : 'none';

  summary.style.display = 'grid';
  result.className = 'result'; // esconde mensagem de erro
}
</script>
</body>
</html>
