<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ex 03 — Média Escolar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--ink:#0f1117;--ink-mid:#3a3d4a;--ink-soft:#6b7280;--surface:#f6f7f9;--card:#ffffff;--border:#e2e4ea;--accent:#2563eb;--green:#16a34a;--green-light:#f0fdf4;--red:#dc2626;--red-light:#fef2f2;--blue-light:#eff6ff;--radius:12px;--radius-sm:8px;}
  body{font-family:'Inter',sans-serif;background:var(--surface);color:var(--ink);line-height:1.6;padding:32px 16px 60px;min-height:100vh;}
  .wrap{max-width:580px;margin:0 auto;}
  .ex-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .ex-head{display:flex;align-items:center;gap:14px;padding:20px 28px;border-bottom:1px solid var(--border);background:#fafafa;}
  .ex-num{width:34px;height:34px;border-radius:50%;background:var(--ink);color:white;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .ex-title{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:600;}
  .ex-body{padding:28px;}
  label{display:block;font-size:.82rem;font-weight:500;color:var(--ink-mid);margin-bottom:6px;}
  input[type=text],input[type=number]{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:.95rem;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s;}
  input:focus{border-color:var(--accent);background:white;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
  .btn{display:inline-flex;align-items:center;background:var(--ink);color:white;border:none;border-radius:var(--radius-sm);padding:11px 22px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;margin-top:14px;}
  .btn:hover{opacity:.85;}.btn:active{transform:scale(.98);}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  .field{margin-bottom:16px;}
  .result{margin-top:18px;padding:16px 20px;border-radius:var(--radius-sm);font-size:1rem;font-weight:500;display:none;align-items:center;gap:10px;}
  .result.show{display:flex;}
  .result.ok{background:var(--green-light);color:var(--green);border:1px solid #bbf7d0;}
  .result.err{background:var(--red-light);color:var(--red);border:1px solid #fecaca;}
  .result.info{background:var(--blue-light);color:var(--accent);border:1px solid #bfdbfe;}
  .result-icon{font-size:1.3rem;flex-shrink:0;}
  @media(max-width:460px){.row3{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="ex-card">
    <div class="ex-head">
      <div class="ex-num">03</div>
      <div class="ex-title">🎓 Média Escolar</div>
    </div>
    <div class="ex-body">
      <div class="field">
        <label for="aluno-nome">Nome do Aluno</label>
        <input type="text" id="aluno-nome" placeholder="Ex: João Silva">
      </div>
      <div class="row3">
        <div>
          <label>Nota 1</label>
          <input type="number" id="nota1" placeholder="0.0" min="0" max="10" step="0.1">
        </div>
        <div>
          <label>Nota 2</label>
          <input type="number" id="nota2" placeholder="0.0" min="0" max="10" step="0.1">
        </div>
        <div>
          <label>Nota 3</label>
          <input type="number" id="nota3" placeholder="0.0" min="0" max="10" step="0.1">
        </div>
      </div>
      <button class="btn" onclick="calcularMedia()">Calcular Média</button>
      <div class="result" id="media-result">
        <span class="result-icon" id="media-icon"></span>
        <span id="media-msg"></span>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Regras ──
   Aprovado  → média entre 7.0 e 10.0  (azul)
   Exame     → média entre 4.0 e 6.9   (verde + quanto falta para 10)
   Reprovado → média abaixo de 4.0     (vermelho)   */

function calcularMedia() {
  const nome = document.getElementById('aluno-nome').value.trim() || 'Aluno';
  const n1   = Number(document.getElementById('nota1').value);
  const n2   = Number(document.getElementById('nota2').value);
  const n3   = Number(document.getElementById('nota3').value);

  const result  = document.getElementById('media-result');
  const iconEl  = document.getElementById('media-icon');
  const msgEl   = document.getElementById('media-msg');

  // Validação dos campos
  if ([n1, n2, n3].some(n => isNaN(n) || n < 0 || n > 10)) {
    result.className = 'result show err';
    iconEl.textContent = '❌';
    msgEl.textContent  = 'Preencha todas as notas com valores entre 0 e 10.';
    return;
  }

  // Conversão obrigatória com Number() antes de somar
  const media = ((Number(n1) + Number(n2) + Number(n3)) / 3).toFixed(2);
  const m = parseFloat(media);

  result.classList.add('show');

  if (m >= 7) {
    result.className   = 'result show info';
    iconEl.textContent = '🎓';
    msgEl.textContent  = `${nome} — Média: ${media} → APROVADO! Parabéns!`;
  } else if (m >= 4) {
    const falta = (10 - m).toFixed(2);
    result.className   = 'result show ok';
    iconEl.textContent = '📋';
    msgEl.textContent  = `${nome} — Média: ${media} → EXAME. Falta ${falta} ponto(s) para atingir 10.`;
  } else {
    result.className   = 'result show err';
    iconEl.textContent = '❌';
    msgEl.textContent  = `${nome} — Média: ${media} → REPROVADO.`;
  }
}
</script>
</body>
</html>
